apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: glance
data:
  glance.yml: |
    pages:
      - name: Home
        columns:
          - size: small
            widgets:
              - type: calendar
                first-day-of-week: monday

              - type: rss
                limit: 10
                collapse-after: 3
                cache: 12h
                feeds:
                  - url: https://selfh.st/rss/
                    title: selfh.st
                    limit: 4

          - size: full
            widgets:
              - type: group
                widgets:
                  - type: hacker-news
                  - type: lobsters

              - type: videos
                channels:
                  - UCGaVdbSav8xWuFWTadK6loA # vlogbrothers
                  - UCOT2iLov0V7Re7ku_3UBtcQ # Hank Green
                  - UCODHrzPMGbNv67e84WDZhQQ # fern
                  - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
                  - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips

              - type: group
                widgets:
                  - type: reddit
                    subreddit: espresso
                    show-thumbnails: true
                  - type: reddit
                    subreddit: formula1
                    show-thumbnails: true
                  - type: reddit
                    subreddit: selfhosted
                    show-thumbnails: true
                  - type: reddit
                    subreddit: homelab
                    show-thumbnails: true

          - size: small
            widgets:
              - type: weather
                location: Berlin, Germany
                units: metric
                hour-format: 24h

              - type: markets
                markets:
                  - symbol: VWCE.DE
                    name: FTSE All-World
                  - symbol: EURTRY=X
                    name: EUR/TRY
                  - symbol: TRY=X
                    name: USD/TRY

              - type: releases
                cache: 1d
                # Without authentication the Github API allows for up to 60 requests per hour. You can create a
                # read-only token from your Github account settings and use it here to increase the limit.
                # token: ...
                repositories:
                  - actualbudget/actual
                  - AdguardTeam/AdguardHome
                  - authelia/authelia
                  - alam00000/bentopdf
                  - amir20/0dozzle
                  - binwiederhier/ntfy
                  - cert-manager/cert-manager
                  - CorentinTh/it-tools
                  - glanceapp/glance
                  - lldap/lldap
                  - louislam/uptime-kuma
                  - metallb/metallb
                  - sissbruecker/linkding
                  - silverbulletmd/silverbullet
                  - syncthing/syncthing
                  - traefik/traefik
