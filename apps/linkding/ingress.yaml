apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: linkding
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`links.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authelia-auth
          namespace: traefik
      services:
        - name: linkding
          port: 80
          namespace: linkding
  tls: {}
