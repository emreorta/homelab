apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: it-tools
  namespace: traefik
spec:
  entryPoints:
    - frp
  routes:
    - match: Host(`tools.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: frp-headers
          namespace: traefik
        - name: authelia-auth
          namespace: traefik
      services:
        - name: it-tools
          port: 80
          namespace: it-tools
