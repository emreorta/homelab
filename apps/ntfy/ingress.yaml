apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ntfy
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ntfy.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authelia-auth
          namespace: traefik
      services:
        - name: ntfy
          port: 80
          namespace: ntfy
  tls: {}
