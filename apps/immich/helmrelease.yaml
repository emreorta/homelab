apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: "0.11.1"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.7.5
            env:
              DB_HOSTNAME: immich-postgres.immich.svc.cluster.local
              DB_PORT: "5432"
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-credentials
                    key: POSTGRES_USER
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-credentials
                    key: POSTGRES_PASSWORD
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-credentials
                    key: POSTGRES_DB

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc

    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: docker.io/valkey/valkey
                tag: 9.1-alpine
                pullPolicy: IfNotPresent
      persistence:
        data:
          size: 1Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          storageClass: local-path

    server:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  memory: "3Gi"
      service:
        main:
          controller: main
          type: LoadBalancer
          annotations:
            metallb.io/loadBalancerIPs: ${IMMICH_LB_IP}
          ports:
            http:
              port: 2283
              targetPort: 2283

    machine-learning:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  memory: "3Gi"
      persistence:
        cache:
          enabled: true
          size: 10Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteMany
          storageClass: local-path
