name: Validate manifests
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate kustomize builds
        run: |
          kubectl kustomize infrastructure/controllers/
          kubectl kustomize infrastructure/configs/
          kubectl kustomize apps/

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@v2.8.5

      - name: Validate Flux manifests
        run: |
          flux check --pre
          kubectl kustomize infrastructure/controllers/ | flux envsubst --strict
          kubectl kustomize infrastructure/configs/ | flux envsubst --strict
          kubectl kustomize apps/ | flux envsubst --strict
