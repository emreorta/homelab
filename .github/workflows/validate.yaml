name: Validate manifests
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate kustomize builds
        run: |
          kubectl kustomize infrastructure/controllers/
          kubectl kustomize infrastructure/configs/
          kubectl kustomize apps/

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@v2.8.6

      - name: Validate Flux manifests
        env:
          DOMAIN: example.com
          METALLB_RANGE: 10.0.0.1-10.0.0.254
          IMMICH_LB_IP: 10.0.0.1
          DNSPROXY_LB_IP: 10.0.0.2
          LDAP_BASE_DN: dc=example,dc=com
          ACME_EMAIL: acme@example.com
          FRP_SERVER_ADDR: 127.0.0.1
          FRP_AUTH_TOKEN: dummy_token_for_validation
          FRP_GROUP_KEY: dummy_group_key
        run: |
          kubectl kustomize infrastructure/controllers/ | flux envsubst --strict
          kubectl kustomize infrastructure/configs/ | flux envsubst --strict
          kubectl kustomize apps/ | flux envsubst --strict
